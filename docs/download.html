<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download - Teleprompter Electron Cam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .subtitle { color: #888; margin-bottom: 2rem; }
    .version { color: #4ade80; margin-bottom: 1.5rem; }
    .loading { color: #888; }
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #4b5563; cursor: not-allowed; }
    .error { color: #f87171; margin-top: 1rem; }
    .all-downloads { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #333; }
    .all-downloads h3 { font-size: 0.9rem; color: #888; margin-bottom: 1rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .links a {
      color: #60a5fa;
      font-size: 0.9rem;
    }
    .links a:hover { text-decoration: underline; }
    .detected { color: #fbbf24; font-size: 0.9rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Teleprompter Electron Cam</h1>
    <p class="subtitle">Overlay de teleprompter para apresentações e lives</p>
    <p class="version" id="version">Carregando...</p>
    <p class="detected" id="detected"></p>
    <a class="btn" id="downloadBtn" href="#">Baixando...</a>
    <p class="error" id="error"></p>
    <div class="all-downloads">
      <h3>Outros sistemas:</h3>
      <div class="links" id="links"></div>
    </div>
  </div>

  <script>
    const repo = 'filipelb/teleprompter_electron_cam';

    function detectOS() {
      const ua = navigator.userAgent.toLowerCase();
      if (ua.includes('win')) return 'windows';
      if (ua.includes('mac')) return 'mac';
      if (ua.includes('linux')) return 'linux';
      return 'unknown';
    }

    function getAssetByOS(assets, os) {
      const osPatterns = {
        windows: '.exe',
        mac: '.dmg',
        linux: '.AppImage'
      };
      const pattern = osPatterns[os];
      return assets.find(a => a.name.toLowerCase().includes(pattern));
    }

    async function fetchLatestRelease() {
      const response = await fetch(`https://api.github.com/repos/${repo}/releases/latest`);
      if (!response.ok) throw new Error('Release não encontrada');
      return response.json();
    }

    async function init() {
      const os = detectOS();
      const osNames = { windows: 'Windows', mac: 'macOS', linux: 'Linux' };
      
      document.getElementById('detected').textContent = `Sistema detectado: ${osNames[os]}`;

      try {
        const release = await fetchLatestRelease();
        document.getElementById('version').textContent = `Versão ${release.tag_name.replace('v', '')}`;

        const currentAsset = getAssetByOS(release.assets, os);
        const btn = document.getElementById('downloadBtn');

        if (currentAsset) {
          btn.href = currentAsset.browser_download_url;
          btn.textContent = `Download para ${osNames[os]}`;
        } else {
          btn.href = release.html_url;
          btn.textContent = 'Ver Release no GitHub';
          btn.target = '_blank';
        }

        const linksContainer = document.getElementById('links');
        release.assets.forEach(asset => {
          const link = document.createElement('a');
          link.href = asset.browser_download_url;
          link.textContent = asset.name;
          link.target = '_blank';
          linksContainer.appendChild(link);
        });

      } catch (err) {
        document.getElementById('error').textContent = 'Erro ao carregar release. Tente baixar diretamente da aba Releases.';
        document.getElementById('downloadBtn').href = `https://github.com/${repo}/releases`;
        document.getElementById('downloadBtn').textContent = 'Ver Releases';
      }
    }

    init();
  </script>
</body>
</html>
